name: Build and Publish Docker Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build

      - name: Generate version number
        id: versioning
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version || '1.0.0'")
          echo "Current version: $CURRENT_VERSION"
          
          # Calculate new version based on commit count since last tag
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER=${GITHUB_RUN_NUMBER:-1}
          
          # Extract major.minor from current version and add build number
          BASE_VERSION=$(echo $CURRENT_VERSION | grep -oE "^[0-9]+\.[0-9]+")
          NEW_VERSION="${BASE_VERSION:-1.0}.${COMMIT_COUNT:-0}"
          
          echo "Generated version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            roeilevinson/tradevis-frontend:latest
            roeilevinson/tradevis-frontend:v${{ steps.versioning.outputs.version }}
          cache-from: type=registry,ref=roeilevinson/tradevis-frontend:latest
          cache-to: type=inline
      
      - name: Update Helm chart with new version (if applicable)
        if: github.event_name != 'pull_request'
        run: |
          # If the app repo is in a different repository, you would need to:
          # 1. Check out that repo
          # 2. Update the values.yaml file
          # 3. Commit and push the changes
          
          echo "New image version successfully published: v${{ steps.versioning.outputs.version }}"
          echo "To update your Helm chart, run:"
          echo "helm upgrade tradevis ./helm-charts/tradevis --set image.tag=v${{ steps.versioning.outputs.version }}" 